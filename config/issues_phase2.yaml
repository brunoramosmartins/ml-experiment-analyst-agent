[TOOL] Implement load_experiment tool|Phase 2: Custom Tools|feature,tool,phase-2|## Context\nload_experiment is the agent's entry point — the first tool called in any analysis. It needs to be robust: handle errors well, return enough information for the agent to know what it can do next, and format output so the LLM can easily interpret it.\n\n## Tasks\n- [ ] Implement @tool load_experiment in src/tools/load_experiment.py\n- [ ] Connect to MLflowAnalystClient\n- [ ] Output: formatted string with experiment summary + runs table\n- [ ] Handle: experiment not found, MLflow offline, zero runs\n- [ ] Unit tests with mocked MLflow: valid experiment, non-existent, no runs\n\n## Definition of done\n- [ ] Tool decorated with @tool and complete docstring\n- [ ] Output is a readable string (not dict or raw JSON)\n- [ ] Errors return an explanatory message, not an unhandled exception\n- [ ] Unit tests passing\n\n## References\n- LangChain @tool decorator: https://python.langchain.com/docs/how_to/custom_tools/
[TOOL] Implement compare_runs, diagnose_run, analyze_patterns tools|Phase 2: Custom Tools|feature,tool,phase-2|## Context\nThese three tools form the agent's analytical core. compare_runs answers "who was better", diagnose_run answers "why", and analyze_patterns answers "what matters". Together they cover the main use cases for experiment analysis.\n\n## Tasks\n### compare_runs (src/tools/compare_runs.py)\n- [ ] Implement @tool compare_runs\n- [ ] Output: Markdown table with runs × metrics, highlight row for best per metric\n- [ ] Optional metrics_to_compare parameter (None = all present metrics)\n\n### diagnose_run (src/tools/diagnose_run.py)\n- [ ] Implement @tool diagnose_run\n- [ ] Use src/analysis/overfitting.py\n- [ ] Output: list of diagnostics with severity icons (INFO, WARNING, CRITICAL)\n\n### analyze_patterns (src/tools/analyze_patterns.py)\n- [ ] Implement @tool analyze_patterns\n- [ ] Use src/analysis/patterns.py\n- [ ] Output: ranking of most impactful parameters with correlation and examples\n\n## Definition of done\n- [ ] All 3 tools implemented and decorated with @tool\n- [ ] Unit tests for 3 happy path cases + 1 error case each\n- [ ] Outputs are readable strings, not Python objects\n\n## References\n- src/analysis/ implemented in Phase 1
[TOOL] Implement suggest_next_experiments and generate_report tools|Phase 2: Custom Tools|feature,tool,phase-2|## Context\nsuggest_next_experiments and generate_report are the agent's "output" tools — what it produces after analysis. generate_report especially is the primary end-user deliverable: a document that can be shared with stakeholders.\n\n## Tasks\n### suggest_next_experiments (src/tools/suggest_next_experiments.py)\n- [ ] Implement @tool suggest_next_experiments\n- [ ] Each suggestion: proposed hyperparameters + justification + testable hypothesis\n- [ ] Output format: numbered sections, one per suggestion\n\n### generate_report (src/tools/generate_report.py)\n- [ ] Implement @tool generate_report\n- [ ] Use src/report/generator.py to build the report\n- [ ] Save via FilesystemBackend (to persist to disk)\n- [ ] Output: path of generated file + preview of first 10 lines\n\n## Definition of done\n- [ ] Both tools implemented with @tool\n- [ ] generate_report saves .md file to correct path\n- [ ] Generated report has all sections defined in Phase 1 (report/generator.py)\n- [ ] Tests: generated report has expected content given a mocked AnalysisResult\n\n## References\n- deepagents FilesystemBackend: https://docs.langchain.com/oss/python/deepagents/backends
