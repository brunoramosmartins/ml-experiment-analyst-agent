[INFRA] Create agent builder with deepagents|Phase 1: Agent Infrastructure|feature,agent,phase-1|## Context\nThe agent needs a centralized factory function that configures all deepagents parameters: model, backend, system_prompt, tools, middleware. Centralizing this in a builder avoids scattered configuration and makes future customization easier.\n\n## Tasks\n- [ ] Create src/agent/builder.py with create_analyst_agent(config: AgentConfig) -> CompiledStateGraph\n- [ ] Create src/agent/config.py with AgentConfig dataclass (model, temperature, workspace_path, etc.)\n- [ ] Configure FilesystemBackend with root at data/agent-workspace/\n- [ ] Add system_prompt placeholder (to be detailed in Phase 3)\n- [ ] Test: agent.invoke({"messages": [{"role": "user", "content": "hello"}]}) returns a response\n\n## Definition of done\n- [ ] src/agent/builder.py with documented create_analyst_agent() function\n- [ ] src/agent/config.py with AgentConfig and default values\n- [ ] Smoke test passing: invoke works without error\n- [ ] No hardcoded credentials or absolute paths\n\n## References\n- deepagents docs: https://docs.langchain.com/oss/python/deepagents/overview\n- FilesystemBackend: https://docs.langchain.com/oss/python/deepagents/backends
[INFRA] Implement MLflowAnalystClient|Phase 1: Agent Infrastructure|feature,mlflow,phase-1|## Context\nThe agent needs an MLflow access layer that abstracts SDK details. The custom tools (Phase 2) will use this client — it is the foundation of the agent's analytical capability.\n\n## Tasks\n- [ ] Create src/mlflow_client/client.py with MLflowAnalystClient\n- [ ] Methods: get_experiment, list_runs, get_run_details, compare_runs\n- [ ] Create src/mlflow_client/models.py with dataclasses: RunInfo, RunDetails, ExperimentInfo\n- [ ] Handle errors: MLflow offline, experiment not found, run without metrics\n- [ ] Create tests/unit/test_mlflow_client.py with MLflow server mocks\n\n## Definition of done\n- [ ] All methods implemented and typed (type hints)\n- [ ] Errors handled with clear messages (not raw stack traces for the agent)\n- [ ] Unit tests passing with mocked data\n- [ ] No dependency on a real MLflow server in tests (use unittest.mock)\n\n## References\n- MLflow Python API: https://mlflow.org/docs/latest/python_api/mlflow.html\n- mlflow.search_runs: https://mlflow.org/docs/latest/python_api/mlflow.html#mlflow.search_runs
[INFRA] Implement analysis modules (metrics, overfitting, patterns)|Phase 1: Agent Infrastructure|feature,analysis,phase-1|## Context\nThe agent's analytical intelligence does not come only from the LLM — it comes from Python functions that process experiment data. These functions must be pure, testable, and well-documented. The LLM will interpret results; the Python functions will compute them.\n\n## Tasks\n### src/analysis/metrics.py\n- [ ] compare_metrics(runs: List[RunDetails]) -> pd.DataFrame: comparative metrics table\n- [ ] rank_runs(df: pd.DataFrame, metric: str, ascending: bool) -> pd.DataFrame\n- [ ] metric_delta(run_a: RunDetails, run_b: RunDetails) -> Dict[str, float]\n\n### src/analysis/overfitting.py\n- [ ] detect_overfitting(run: RunDetails, threshold: float = 0.1) -> OverfittingReport\n- [ ] detect_overfitting_trend(runs: List[RunDetails]) -> List[OverfittingReport]\n\n### src/analysis/patterns.py\n- [ ] correlate_params_metrics(runs: List[RunDetails]) -> CorrelationReport\n\n### src/analysis/suggestions.py\n- [ ] suggest_next_experiments(analysis: AnalysisResult) -> List[ExperimentSuggestion]\n\n## Definition of done\n- [ ] All functions with type hints and docstrings\n- [ ] Pure functions (no side effects, no external calls)\n- [ ] tests/unit/test_analysis.py with cases for: overfitting detected, not detected, runs without validation data, empty list of runs\n- [ ] Test coverage > 80% on analysis modules\n\n## References\n- Overfitting detection heuristics: train/val gap > threshold on any primary metric
[INFRA] Validate LangSmith integration|Phase 1: Agent Infrastructure|observability,phase-1|## Context\nLangSmith is the native observability system for the LangChain/LangGraph ecosystem. It automatically captures agent execution traces: which tools were called, with which inputs, which outputs, latency, and tokens. Validating this in Phase 1 ensures observability will work from the first real execution.\n\n## Tasks\n- [ ] Configure LANGCHAIN_TRACING_V2=true and LANGCHAIN_PROJECT in .env\n- [ ] Run a basic agent invoke and verify trace in LangSmith dashboard\n- [ ] Create src/observability/langsmith.py with:\n  - add_run_metadata(key: str, value: Any): adds custom metadata to current trace\n  - tag_trace(tags: List[str]): adds tags to trace\n- [ ] Capture screenshots of LangSmith dashboard showing full trace\n- [ ] Create docs/observability.md with: what is captured, how to access, screenshots\n\n## Definition of done\n- [ ] Traces appearing in LangSmith after agent invoke\n- [ ] Custom metadata visible in traces\n- [ ] docs/observability.md created with screenshots and explanations\n- [ ] .env.example documented with all LangSmith variables\n\n## References\n- LangSmith quickstart: https://docs.smith.langchain.com/\n- LangGraph tracing: https://langchain-ai.github.io/langgraph/how-tos/tracing/
