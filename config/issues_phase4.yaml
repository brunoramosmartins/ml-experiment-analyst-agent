[OBSERVABILITY] Implement GovernanceMiddleware|Phase 4: Observability|feature,observability,agent,phase-4|## Context\nGovernanceMiddleware is the backbone of the project's custom observability. It complements LangSmith (which captures traces at LLM level) with structured business logs: which tools were called, with which inputs, for how long, with what result. These logs are read by the Streamlit dashboard.\n\n## Tasks\n- [ ] Create src/observability/governance_middleware.py with GovernanceMiddleware\n- [ ] Implement hooks: on_agent_start, on_tool_start, on_tool_end, on_tool_error, on_agent_end\n- [ ] Each event: JSON with timestamp, run_id, event_type, tool_name, input_summary, output_summary, duration_ms\n- [ ] Save logs to data/logs/agent_traces/{YYYY-MM-DD}/{run_id}.jsonl\n- [ ] Integrate middleware in create_analyst_agent()\n- [ ] Validate: logs generated after running scripts/run_demo.py\n\n## Definition of done\n- [ ] Middleware integrated and functional\n- [ ] JSONL logs generated for each agent execution\n- [ ] Each log has all fields defined above\n- [ ] Unit tests: mock tool call → verify generated log\n\n## References\n- deepagents middleware docs: deepagents README, "middleware" section\n- LangChain AgentMiddleware: https://docs.langchain.com/oss/python/langchain/middleware
[OBSERVABILITY] Create Streamlit governance dashboard|Phase 4: Observability|feature,dashboard,observability,phase-4|## Context\nThe dashboard is what makes observability visible. It is what you will show in interviews and include in the README as a demo GIF. It transforms JSONL logs into a navigable interface that demonstrates control over agent behavior.\n\n## Tasks\n- [ ] Create src/dashboard/app.py with Streamlit\n- [ ] Implement src/dashboard/log_reader.py to parse JSONL logs\n- [ ] "Run Explorer" page: list of runs → run detail → tool calls timeline\n- [ ] "Analytics" page: tool frequency, average latency, error rate\n- [ ] Create make run-dashboard in Makefile\n- [ ] Record demo GIF of the dashboard (use LiceCap or Kap)\n- [ ] Save screenshots in docs/assets/dashboard/\n\n## Definition of done\n- [ ] make run-dashboard starts the app without errors\n- [ ] Tool calls timeline visible for each run\n- [ ] Tool usage metrics calculated correctly\n- [ ] Screenshots and GIF created\n\n## References\n- Streamlit docs: https://docs.streamlit.io/\n- LiceCap (GIF recorder): https://www.cockos.com/licecap/
[AGENT] Configure Human-in-the-Loop for generate_report|Phase 4: Observability|feature,agent,hitl,phase-4|## Context\nHuman-in-the-loop is one of the most differentiated features of deepagents. Configuring HITL for generate_report demonstrates that you understand not only how to build agents, but how to control them safely. This is a clear technical differentiator in the portfolio.\n\n## Tasks\n- [ ] Configure interrupt_on for generate_report tool in create_analyst_agent()\n- [ ] Implement approval flow: agent stops before generating, shows report preview, waits for user decision\n- [ ] Implement "edit" mode: user can change title and scope before approving\n- [ ] Test with scripts/run_demo_hitl.py\n- [ ] Record HITL flow GIF\n- [ ] Document in docs/hitl.md\n\n## Definition of done\n- [ ] Agent stops before generating report and displays preview message\n- [ ] User can approve, edit, or reject\n- [ ] HITL flow documented with GIF\n- [ ] docs/hitl.md with design explanation and motivation\n\n## References\n- deepagents HITL: https://docs.langchain.com/oss/python/deepagents/human-in-the-loop\n- LangGraph interrupt: https://langchain-ai.github.io/langgraph/concepts/human_in_the_loop/
